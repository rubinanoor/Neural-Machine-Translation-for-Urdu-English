# configs/base.yaml
# =============================================================================
# BASE CONFIGURATION — shared defaults for all three ablation experiments.
# Individual vocab configs (vocab_8k.yaml, etc.) override specific fields.
# This file is NOT run directly — it's documentation only.
# =============================================================================

experiment_name: "base"

# ── Data paths (Kaggle default) ──────────────────────────────────────────────
train_path: "/kaggle/working/final/train.tsv"
val_path:   "/kaggle/working/final/val.tsv"
test_path:  "/kaggle/working/final/test.tsv"

# ── Base model ────────────────────────────────────────────────────────────────
model_name: "Helsinki-NLP/opus-mt-ur-en"
# Pre-trained MarianMT. Already fine-tuned on OPUS Urdu-English.
# We fine-tune further on our cleaned, domain-specific training set.

# ── Sequence lengths ──────────────────────────────────────────────────────────
max_source_length: 128
max_target_length: 128

# ── Core hyperparameters ──────────────────────────────────────────────────────
num_train_epochs:            3
per_device_train_batch_size: 32
per_device_eval_batch_size:  64
learning_rate:               2.0e-5
weight_decay:                0.01
warmup_steps:                500

# ── Generation (beam search) ──────────────────────────────────────────────────
predict_with_generate: true
generation_max_length:  128
num_beams:              4

# ── Hardware ──────────────────────────────────────────────────────────────────
fp16:                   true    # Use on Kaggle GPU. Set false for CPU.
dataloader_num_workers: 2

# ── Checkpointing ─────────────────────────────────────────────────────────────
evaluation_strategy:    "epoch"
save_strategy:          "epoch"
save_total_limit:       2
load_best_model_at_end: true
metric_for_best_model:  "bleu"
greater_is_better:      true

# ── Logging ───────────────────────────────────────────────────────────────────
logging_steps: 100
report_to:     "none"   # Change to "tensorboard" for training curves

# ── Reproducibility ───────────────────────────────────────────────────────────
seed: 42

# ── Debug limits (leave null for full training) ───────────────────────────────
max_train_samples: null
max_val_samples:   null